<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=414, height=896, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Mobile Preview</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .phone-frame {
        --bezel: 10px;
        --radius: 44px;
        --screen-width: 414px;
        --screen-height: 896px;
        width: calc(var(--screen-width) + var(--bezel) * 2);
        padding: var(--bezel);
        background: #c7c7cc;
        border-radius: var(--radius);

        position: relative;
      }
      .phone-frame::before {
        content: '';
        position: absolute;
        top: var(--bezel);
        left: 50%;
        transform: translateX(-50%);
        width: 125px;
        height: 28px;
        background: #1c1c1e;
        border-radius: 0 0 18px 18px;
        z-index: 10;
      }
      .phone-frame::after {
        content: '';
        position: absolute;
        bottom: var(--bezel);
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: #1c1c1e;
        border-radius: 3px;
        z-index: 10;
      }
      .phone-screen {
        width: var(--screen-width);
        height: var(--screen-height);
        background: #fff;
        border-radius: 36px;
        overflow: hidden;
        position: relative;
      }
      .phone-screen iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="phone-frame">
      <div class="phone-screen">
        <iframe id="preview-frame" title="Mobile preview"></iframe>
      </div>
    </div>
    <script>
      (function() {
        const params = new URLSearchParams(window.location.search);
        const embed = params.get('embed');
        if (embed) {
          const url = new URL(embed, window.location.origin);
          url.searchParams.set('viewport', 'mobile');
          document.getElementById('preview-frame').src = url.toString();
        }
      })();
    </script>
  </body>
</html>
